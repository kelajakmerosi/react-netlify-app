services:
  - type: web
    name: kelajakmerosi
    env: node
    # Render runs all commands from the rootDir below.
    # @types/* and typescript are in dependencies (not devDependencies) so
    # they are always installed regardless of NODE_ENV.
    # tsconfig has no explicit rootDir; TypeScript infers the repo root as the
    # common ancestor of src/**/* and ../shared/**/* — compiled output mirrors
    # that structure, so the entry point is dist/server/src/index.js.
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
