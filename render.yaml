services:
  - type: web
    name: kelajakmerosi
    env: node
    # @types/* and typescript are in dependencies so they are always installed
    # regardless of NODE_ENV or Render's production mode setting. zod is resolved
    # via tsconfig paths from server/node_modules/zod.
    buildCommand: npm install && npm run build
    # tsconfig has no rootDir so TypeScript infers repo root as common ancestor
    # of src/**/* and ../shared/**/* — compiled output mirrors that structure.
    startCommand: NODE_PATH=$PWD/server/node_modules:$PWD/node_modules npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
